# Po pushu na main — wymusza CI (i opcjonalnie Vercel) w Slavia-Website oraz CI w Slavia-Mobile.
#
# Wymagany sekret w tym repo (Settings → Secrets → Actions):
#   SLAVIA_REPO_DISPATCH_TOKEN — PAT z scope `repo` (Fine-grained: Contents R/W na Website + Mobile)
name: Dispatch dependent builds

on:
  push:
    branches: [main]

concurrency:
  group: dispatch-dependents-${{ github.sha }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Slavia-Website
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.SLAVIA_REPO_DISPATCH_TOKEN }}
          repository: JakubGawron1/Slavia-Website
          event-type: slavia-shared-updated
          client-payload: >-
            {"shared_sha":"${{ github.sha }}","shared_repo":"${{ github.repository }}"}

      - name: Trigger Slavia-Mobile
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.SLAVIA_REPO_DISPATCH_TOKEN }}
          repository: JakubGawron1/Slavia-Mobile
          event-type: slavia-shared-updated
          client-payload: >-
            {"shared_sha":"${{ github.sha }}","shared_repo":"${{ github.repository }}"}
